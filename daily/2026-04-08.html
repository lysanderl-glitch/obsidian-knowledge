    background: #f5f5f5;

  .container {
    max-width: 720px;

    text-align: center;

  }
  .header .date {

    color: #999;
    margin-top: 8px;
  }
  .entry {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;

  }
  .entry .time {
    font-size: 12px;
    color: #aaa;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .entry .time::before {
    content: "";
    display: inline-block;
    width: 8px;
    height: 8px;
    background: #4CAF50;
    border-radius: 50%;
  }
  .entry .text {
    font-size: 16px;
    margin-bottom: 12px;
    white-space: pre-wrap;
  }
  .entry .images {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }
  .entry .images img {
    max-width: 100%;
    border-radius: 8px;
    cursor: pointer;
  }
  .entry .images.single img {
    max-width: 100%;
  }
  .entry .images.multi img {
    max-width: calc(50% - 5px);
  }
  .entry.voice .time::before {
    background: #2196F3;
  }
  .entry.image-only .time::before {
    background: #FF9800;
  }
  .footer {
    text-align: center;
    padding: 30px 0;
    color: #ccc;
    font-size: 12px;
  }
  @media (max-width: 480px) {
    .container { padding: 10px; }
    .entry { padding: 15px; }
  }
</style>
</head>
