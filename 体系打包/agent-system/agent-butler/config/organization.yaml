# OBS团队专有配置
obs_team_config:
  # 知识库根目录
  knowledge_base_root: "/home/ubuntu/knowledge-base/obs"

  # 知识库结构
  structure:
    - "01-team-knowledge"      # 团队知识
    - "02-project-knowledge"   # 项目知识
    - "03-process-knowledge"    # 流程知识
    - "04-decision-knowledge"  # 决策知识
    - "05-industry-knowledge"  # 行业知识

  # OBS团队内部协作流程
  internal_workflow:
    knowledge_intake:
      description: "知识入库流程"
      sequence:
        - obs_architecture_expert  # 1. 设计存储结构
        - knowledge_chandu_expert      # 2. 执行沉淀
        - knowledge_quality_expert # 3. 质量审核
        - knowledge_search_expert  # 4. 建立索引

    knowledge_query:
      description: "知识查询流程"
      sequence:
        - knowledge_search_expert  # 1. 执行检索
        - knowledge_quality_expert # 2. 结果校验（如需要）

    knowledge_audit:
      description: "知识审计流程"
      sequence:
        - knowledge_quality_expert  # 1. 执行审计
        - obs_architecture_expert  # 2. 结构优化
        - knowledge_chandu_expert       # 3. 补充缺失
